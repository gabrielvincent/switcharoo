[workspace]
members = ["exec-lib", "core-lib", "windows-lib", "launcher-lib", "hyprshell"]
resolver = "2"

[workspace.package]
version = "0.1.1"
description = "hyprshell is a Rust-based GUI designed to enhance window management in hyprland"
license = "MIT"
authors = ["h3rmt"]
keywords = ["hyprland"]
repository = "https://github.com/h3rmt/hyprshell/"
rust-version = "1.80"
edition = "2021"

[workspace.dependencies]
anyhow = { version = "1.0.95" }
tracing = { version = "0.1.41" }
serde_json = { version = "1.0.135" }

gtk = { version = "0.9.6", package = "gtk4", default-features = false, features = ["v4_6"] }
gtk4-layer-shell = { version = "0.5.0" }

core-lib = { path = "core-lib", package = "hyprshell-core-lib", version = "0.1.1" }
exec-lib = { path = "exec-lib", package = "hyprshell-exec-lib", version = "0.1.1" }
windows-lib = { path = "windows-lib", package = "hyprshell-windows-lib", version = "0.1.1" }
launcher-lib = { path = "launcher-lib", package = "hyprshell-launcher-lib", version = "0.1.1" }


[profile.release]
strip = "debuginfo"
lto = true
opt-level = "s"
