[package]
name = "hyprshell"
readme = "README.md"
documentation = "https://docs.rs/hyprshell"
version = "0.5.4"
edition.workspace = true
description.workspace = true
license.workspace = true
authors.workspace = true
keywords.workspace = true
repository.workspace = true
rust-version.workspace = true
exclude = [
    ".idea/*",
    ".github/*",
]
include = [
    "img/*"
]

[dependencies]
anyhow.workspace = true
tracing.workspace = true
gtk.workspace = true
serde_json.workspace = true
clap = { version = "4.5.23", features = ["derive"] }
tracing-subscriber = { version = "0.3.19", features = ["fmt", "env-filter", "ansi"], default-features = false }

rand = { version = "0.9.0" }
async-channel = { version = "2.3.1", default-features = true }

core-lib.workspace = true
exec-lib.workspace = true
windows-lib.workspace = true
launcher-lib.workspace = true

[features]
default = ["toml_config", "generate_config_command", "launcher_calc"]
generate_config_command = ["core-lib/generate_config"]
toml_config = ["core-lib/toml_config"]
launcher_calc = ["launcher-lib/calc", "core-lib/calc"]
debug_command = []
bar = []

[workspace]
members = ["exec-lib", "core-lib", "windows-lib", "launcher-lib"]
resolver = "2"


[workspace.package]
version = "0.5.4"
description = "hyprshell is a Rust-based GUI designed to enhance window management in hyprland"
license = "MIT"
authors = ["h3rmt"]
keywords = ["hyprland"]
repository = "https://github.com/h3rmt/hyprshell/"
rust-version = "1.82.0"
edition = "2021"

[workspace.dependencies]
anyhow = { version = "1.0.95" }
tracing = { version = "0.1.41" }
serde_json = { version = "1.0.135" }

gtk = { version = "0.9.6", package = "gtk4", default-features = false, features = ["v4_12"] }
gtk4-layer-shell = { version = "0.5.0" }

core-lib = { path = "core-lib", package = "hyprshell-core-lib", version = "=0.5.4" }
exec-lib = { path = "exec-lib", package = "hyprshell-exec-lib", version = "=0.5.4" }
windows-lib = { path = "windows-lib", package = "hyprshell-windows-lib", version = "=0.5.4" }
launcher-lib = { path = "launcher-lib", package = "hyprshell-launcher-lib", version = "=0.5.4" }

[profile.release]
strip = "debuginfo"
lto = true
opt-level = "s"
