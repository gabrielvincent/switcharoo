name: test

on:
  push:
    branches-ignore:
      - 'release-please-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Run Nix Flake Check
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: 'true'
      - uses: cachix/install-nix-action@56a7bb7b56d9a92d4fd1bc05758de7eea4a370a8 # v31.6.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: "download-buffer-size = 1048576000"
      - uses: cachix/cachix-action@v14
        with:
          name: hyprshell-dev
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN_DEV }}
      - name: Run Nix Flake Check build
        run: nix build '.?submodules=1#checks.x86_64-linux.hyprshell-config-check' -L
      - name: Run Nix Flake Check clippy
        run: nix build '.?submodules=1#checks.x86_64-linux.hyprshell-clippy' -L
      - name: Run Nix Flake Check fmt
        run: nix build '.?submodules=1#checks.x86_64-linux.hyprshell-fmt' -L
      - name: Run Nix Flake Check test
        run: nix build '.?submodules=1#checks.x86_64-linux.hyprshell-test' -L
      - name: Run Nix Flake Check check-nix-configs
        run: nix build '.?submodules=1#checks.x86_64-linux.check-nix-configs' -L

  check-all-features:
    name: Run Nix Flake all features Check
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: 'true'
      - uses: cachix/install-nix-action@56a7bb7b56d9a92d4fd1bc05758de7eea4a370a8 # v31.6.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: "download-buffer-size = 1048576000"
      - uses: cachix/cachix-action@v14
        with:
          name: hyprshell-dev
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN_DEV }}
      - name: Run Nix Flake Check check-all-feature-combinations
        run: nix build '.?submodules=1#checks.x86_64-linux.check-all-feature-combinations' -L
