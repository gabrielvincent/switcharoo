name: test

on:
  push:
    branches-ignore:
      - 'release-please-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Run Nix Flake Check
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@f0fe604f8a612776892427721526b4c7cfb23aba # v31.4.1
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v14
        with:
          name: hyprshell
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Increase nix download-buffer-size
        run: echo "download-buffer-size = 1048576000" | sudo tee -a /etc/nix/nix.conf && cat /etc/nix/nix.conf
      - name: Run Nix Flake Check build
        run: nix build '.#checks.x86_64-linux.hyprshell-default-check' -L
      - name: Run Nix Flake Check clippy
        run: nix build '.#checks.x86_64-linux.hyprshell-clippy' -L
      - name: Run Nix Flake Check fmt
        run: nix build '.#checks.x86_64-linux.hyprshell-fmt' -L
      - name: Run Nix Flake Check check-nix-config
        run: nix build '.#checks.x86_64-linux.check-nix-config' -L

  check-all-features:
    name: Run Nix Flake all features Check
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@f0fe604f8a612776892427721526b4c7cfb23aba # v31.4.1
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v14
        with:
          name: hyprshell-check-features
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN_2 }}
      - name: Increase nix download-buffer-size
        run: echo "download-buffer-size = 1048576000" | sudo tee -a /etc/nix/nix.conf && cat /etc/nix/nix.conf
      - name: Run Nix Flake Check check-all-feature-combinations
        run: nix build '.#checks.x86_64-linux.check-all-feature-combinations' -L
