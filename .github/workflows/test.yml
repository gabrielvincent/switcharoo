name: test

on:
  push:
    branches-ignore:
      - 'release-please-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: "ubuntu-latest"
    container:
      image: alpine:latest@sha256:8a1f59ffb675680d47db6337b49d22281a139e9d709335b492be023728e11715
    steps:
      - name: Install git and other dependencies
        run: apk add --no-cache git tar pkgconf cargo gtk4.0-dev gtk4-layer-shell-dev bash
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Load Rust Cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true
      - name: Build
        run: ./scripts/test.sh

  clippy:
    name: Run Clippy
    runs-on: "ubuntu-latest"
    container:
      image: alpine:latest@sha256:8a1f59ffb675680d47db6337b49d22281a139e9d709335b492be023728e11715
    steps:
      - name: Install git and other dependencies
        run: apk add --no-cache git tar pkgconf cargo gtk4.0-dev gtk4-layer-shell-dev rust-clippy
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Load Rust Cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true
      - name: Run Clippy
        run: cargo clippy --all-targets

  check-nix:
    name: Run Nix Flake Check
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v11
      - uses: DeterminateSystems/flake-checker-action@v10 
      - name: Run Nix Flake Check
        run: nix flake check -L
    
