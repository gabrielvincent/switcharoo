name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install gtk4-layer-shell
        working-directory: /tmp
        run: |
          sudo apt-get update
          sudo apt -y install git libglib2.0-dev libgraphene-1.0-dev meson ninja-build libwayland-dev libgtk-4-dev gobject-introspection libadwaita-1-dev libgirepository1.0-dev python3 valac
          git clone https://github.com/wmww/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
      - name: Install cargo-workspaces
        run: |
          mkdir -p $HOME/.cargo/bin
          curl --location --silent --show-error --fail "https://github.com/cargo-bins/cargo-quickinstall/releases/download/cargo-workspaces-0.3.6/cargo-workspaces-0.3.6-x86_64-unknown-linux-gnu.tar.gz" | tar -xzvvf - -C $HOME/.cargo/bin
      - name: Publish to crates.io
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch --tags origin hyprshell
          git checkout ${{ github.ref }} -b hyprshell
          
          echo "removing old tag"
          git tag --delete ${{ github.ref_name }}
          git push --delete origin ${{ github.ref_name }}
          
          version=$(echo ${{ github.ref_name }} | sed 's/v//')
          cargo ws publish custom $version -m "chore(release): bump rust versions to $version" --no-individual-tags --allow-branch hyprshell --exact --yes --force "hyprshell*" --token ${{ secrets.CRATES_TOKEN }}
          
          gh release edit ${{ github.ref_name }} --latest --draft=false --title "hyprshell ${{ github.ref_name }}"
          git push origin HEAD:hyprshell-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: hyprshell
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update hyprshell AUR package
          updpkgsums: true
          ssh_keyscan_types: rsa,ecdsa,ed25519